server {
    listen 80;
    server_name cricketapp.ufdevs.live;

    # Large uploads (500MB)
    client_max_body_size 500M;

    # Longer timeout for video processing
    proxy_read_timeout    300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass         http://cricket-api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# To enable HTTPS later, replace server_name above as needed and
# add a separate 443 server block with valid cert paths mounted at /etc/nginx/certs
# as described in deployment_guide.md, then run with: docker compose --profile nginx up -d

# Node app on host:3000 served at ufdevs.live
server {
    listen 80;
    server_name ufdevs.live;

    location / {
        proxy_pass         http://host.docker.internal:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
